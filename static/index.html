<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot của Hiếu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="app-container">
        <!-- Sidebar Setup -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <div class="orb"></div>
                <h2>Chatbot của Hiếu</h2>
            </div>
            
            <div class="settings">
                <h3>Settings</h3>
                <div class="input-group">
                    <label for="apiKey">Agent API Key</label>
                    <input type="password" id="apiKey" value="dev-key-change-me" placeholder="Nhập API Key...">
                </div>
                <div class="status-panel">
                    <div class="status-item">
                        <span class="status-dot healthy"></span>
                        <span>System Health: <b id="healthStatus">Checking...</b></span>
                    </div>
                </div>
            </div>
            
            <div class="decorative-blob"></div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area glass-panel">
            <header class="chat-header">
                <div>
                    <h1>Chatbot của Hiếu 🤖</h1>
                    <p>Powered by GPT-4o Mini · Cloud Deployment</p>
                </div>
            </header>
            
            <div class="chat-messages" id="chatBox">
                <!-- Welcome Message -->
                <div class="message ai-message">
                    <div class="avatar">AI</div>
                    <div class="content">
                        Xin chào! Hệ thống đã kết nối thành công tới AI Agent. Tôi có thể giúp gì cho bạn hôm nay?
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <form id="chatForm">
                    <input type="text" id="userInput" placeholder="Nhập tin nhắn của bạn vào đây..." autocomplete="off">
                    <button type="submit" id="sendBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
